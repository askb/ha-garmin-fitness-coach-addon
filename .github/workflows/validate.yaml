name: 'Validate'

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  lint-shellcheck:
    name: 'ShellCheck'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: 'Run ShellCheck'
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'

  lint-yaml:
    name: 'YAML Lint'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: 'Install yamllint'
        run: pip install yamllint

      - name: 'Run yamllint'
        run: yamllint .

  lint-dockerfile:
    name: 'Dockerfile Lint'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: 'Lint Dockerfile'
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: pulsecoach/Dockerfile
          failure-threshold: error

  lint-json:
    name: 'JSON Lint'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: 'Validate addon config'
        run: |
          python3 -m json.tool pulsecoach/config.json > /dev/null
          python3 -m json.tool pulsecoach/build.json > /dev/null
          python3 -m json.tool repository.json > /dev/null
