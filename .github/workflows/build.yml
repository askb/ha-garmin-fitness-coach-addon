# SPDX-License-Identifier: MIT
name: Build and Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  GARMIN_COACH_REPO: askb/garmin-coach
  GARMIN_COACH_REF: main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate addon config
        run: |
          python3 -c "
          import json, sys
          for f in ['garmincoach/config.json', 'garmincoach/build.json', 'repository.json']:
              try:
                  json.load(open(f))
                  print(f'✓ {f}')
              except Exception as e:
                  print(f'✗ {f}: {e}')
                  sys.exit(1)
          "
      - name: Shellcheck s6 scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: garmincoach/rootfs

  build:
    name: Build (${{ matrix.arch }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Checkout garmin-coach app
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GARMIN_COACH_REPO }}
          ref: ${{ env.GARMIN_COACH_REF }}
          path: garmincoach/garmin-coach

      - name: Set up QEMU (for cross-compilation)
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read build config
        id: config
        run: |
          BUILD_FROM=$(jq -r ".build_from.${{ matrix.arch }}" garmincoach/build.json)
          VERSION=$(jq -r '.version' garmincoach/config.json)
          echo "build_from=${BUILD_FROM}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: garmincoach
          file: garmincoach/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/garmincoach-addon-${{ matrix.arch }}:${{ steps.config.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/garmincoach-addon-${{ matrix.arch }}:latest
          build-args: |
            BUILD_FROM=${{ steps.config.outputs.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
          platforms: ${{ matrix.arch == 'aarch64' && 'linux/arm64' || 'linux/amd64' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation
            Add this repository URL to your Home Assistant addon store:
            ```
            https://github.com/${{ github.repository }}
            ```
