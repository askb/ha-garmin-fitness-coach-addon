name: Build and Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  GARMIN_COACH_REPO: askb/garmin-coach
  GARMIN_COACH_REF: main

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [amd64, aarch64]
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Checkout garmin-coach app
        uses: actions/checkout@v6
        with:
          repository: ${{ env.GARMIN_COACH_REPO }}
          ref: ${{ env.GARMIN_COACH_REF }}
          path: garmincoach/garmin-coach

      - name: Set up QEMU (for cross-compilation)
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read build config
        id: config
        run: |
          BUILD_FROM=$(jq -r ".build_from.${{ matrix.arch }}" garmincoach/build.json)
          VERSION=$(jq -r '.version' garmincoach/config.json)
          echo "build_from=${BUILD_FROM}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: garmincoach
          file: garmincoach/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/garmincoach-addon-${{ matrix.arch }}:${{ steps.config.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/garmincoach-addon-${{ matrix.arch }}:latest
          build-args: |
            BUILD_FROM=${{ steps.config.outputs.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
          platforms: ${{ matrix.arch == 'aarch64' && 'linux/arm64' || 'linux/amd64' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation
            Add this repository URL to your Home Assistant addon store:
            ```
            https://github.com/${{ github.repository }}
            ```
