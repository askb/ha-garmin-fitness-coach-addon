name: Build and Publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

env:
  PULSECOACH_APP_REPO: askb/ha-garmin-fitness-coach-app
  GARMIN_COACH_REF: main

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30
    strategy:
      matrix:
        arch: [amd64, aarch64]
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6

      - name: Checkout garmin-coach app
        uses: actions/checkout@v6
        with:
          repository: ${{ env.PULSECOACH_APP_REPO }}
          ref: ${{ env.GARMIN_COACH_REF }}
          path: pulsecoach/garmin-coach

      - name: Set up QEMU (for cross-compilation)
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read build config
        id: config
        run: |
          BUILD_FROM=$(jq -r ".build_from.${{ matrix.arch }}" pulsecoach/build.json)
          VERSION=$(jq -r '.version' pulsecoach/config.json)
          echo "build_from=${BUILD_FROM}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: pulsecoach
          file: pulsecoach/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/pulsecoach-addon-${{ matrix.arch }}:${{ steps.config.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/pulsecoach-addon-${{ matrix.arch }}:latest
          build-args: |
            BUILD_FROM=${{ steps.config.outputs.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
            CACHEBUST=${{ github.sha }}
          platforms: ${{ matrix.arch == 'aarch64' && 'linux/arm64' || 'linux/amd64' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # NOTE: Release creation is handled by .github/workflows/release.yaml
  # which includes SBOM scanning and per-arch image builds.
  # This job is intentionally disabled to avoid duplicate releases.
  # release:
  #   name: Create Release
  #   needs: build
  #   if: startsWith(github.ref, 'refs/tags/v')
  #   ...
