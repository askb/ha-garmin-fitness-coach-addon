name: 'Release'

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  gate:
    name: 'Release Gate'
    uses: ./.github/workflows/release-gate.yml
    permissions:
      contents: read

  validate:
    name: 'Validate'
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: 'ShellCheck'
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca  # master

      - name: 'YAML lint'
        run: |
          pip install yamllint
          yamllint .

      - name: 'Validate JSON configs'
        run: |
          python3 -m json.tool pulsecoach/config.json > /dev/null
          python3 -m json.tool pulsecoach/build.json > /dev/null
          python3 -m json.tool repository.json > /dev/null

      - name: 'Lint Dockerfile'
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: pulsecoach/Dockerfile

  build-push:
    name: 'Build & Push (${{ matrix.arch }})'
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    # aarch64 builds run under QEMU emulation and are far slower than the
    # native amd64 build, so give them a much larger timeout budget.
    timeout-minutes: ${{ matrix.arch == 'aarch64' && 120 || 30 }}
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/home-assistant/amd64-base:3.21
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/home-assistant/aarch64-base:3.21
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: 'Set up QEMU'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0

      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: 'Login to GHCR'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Extract version from tag'
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: 'Build and push arch image'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: pulsecoach
          push: true
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            BUILD_ARCH=${{ matrix.arch }}
            CACHEBUST=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/pulsecoach-addon-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/pulsecoach-addon-${{ matrix.arch }}:latest
          labels: |
            org.opencontainers.image.title=PulseCoach HA Addon
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sbom-scan:
    name: 'SBOM & Security Scan'
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: write
      packages: read
    timeout-minutes: 15
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: 'Login to GHCR'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Extract version from tag'
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: 'Generate SBOM from image'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/pulsecoach-addon-amd64:${{ steps.version.outputs.version }}
          format: cyclonedx-json
          output-file: sbom-cyclonedx.json

      - name: 'Grype vulnerability scan'
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v7
        with:
          sbom: sbom-cyclonedx.json
          output-format: 'table'
          fail-build: 'false'
          config: '.grype.yaml'

      - name: 'Upload SBOM'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: sbom-files
          path: sbom-cyclonedx.json
          retention-days: 90

  release:
    name: 'Create Release'
    runs-on: ubuntu-latest
    needs: [validate, build-push, sbom-scan]
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: 'audit'

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 'Download SBOM'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: sbom-files
          path: sbom/

      - name: 'Create GitHub Release'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3
        with:
          generate_release_notes: true
          files: sbom/sbom-cyclonedx.json
