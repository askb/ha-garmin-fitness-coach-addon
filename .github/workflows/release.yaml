name: 'Release'

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  validate:
    name: 'Validate'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: 'audit'

      - uses: actions/checkout@v4

      - name: 'ShellCheck'
        uses: ludeeus/action-shellcheck@master

      - name: 'YAML lint'
        run: |
          pip install yamllint
          yamllint .

      - name: 'Validate JSON configs'
        run: |
          python3 -m json.tool garmincoach/config.json > /dev/null
          python3 -m json.tool garmincoach/build.json > /dev/null
          python3 -m json.tool repository.json > /dev/null

      - name: 'Lint Dockerfile'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: garmincoach/Dockerfile

  build-push:
    name: 'Build & Push'
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: 'audit'

      - uses: actions/checkout@v4

      - name: 'Set up QEMU'
        uses: docker/setup-qemu-action@v3

      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@v4

      - name: 'Login to GHCR'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Extract version from tag'
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: 'Build and push multi-arch image'
        uses: docker/build-push-action@v6
        with:
          context: garmincoach
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/ha-garmin-fitness-coach-addon:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/ha-garmin-fitness-coach-addon:latest
          labels: |
            org.opencontainers.image.title=GarminCoach HA Addon
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sbom-scan:
    name: 'SBOM & Security Scan'
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      packages: read
    timeout-minutes: 15
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: 'audit'

      - uses: actions/checkout@v4

      - name: 'Login to GHCR'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Generate SBOM from image'
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/ha-garmin-fitness-coach-addon:latest
          format: cyclonedx-json
          output-file: sbom-cyclonedx.json

      - name: 'Grype vulnerability scan'
        uses: anchore/scan-action@v5
        with:
          sbom: sbom-cyclonedx.json
          output-format: 'table'
          fail-build: 'false'
          config: '.grype.yaml'

      - name: 'Upload SBOM'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-files
          path: sbom-cyclonedx.json
          retention-days: 90

  release:
    name: 'Create Release'
    runs-on: ubuntu-latest
    needs: [validate, build-push, sbom-scan]
    permissions:
      contents: write
    timeout-minutes: 5
    steps:
      - uses: step-security/harden-runner@v2
        with:
          egress-policy: 'audit'

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 'Download SBOM'
        uses: actions/download-artifact@v4
        with:
          name: sbom-files
          path: sbom/

      - name: 'Create GitHub Release'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: sbom/sbom-cyclonedx.json
