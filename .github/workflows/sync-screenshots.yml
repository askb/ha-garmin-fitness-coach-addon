#
# After each release, capture fresh screenshots from the production image
# and open PRs to update docs/screenshots/ in both the addon and app repos.
# This prevents the README screenshots from going stale.
---
name: Sync Screenshots

"on":
  release:
    types: [published]

permissions: {}

concurrency:
  group: "${{ github.workflow }}"
  cancel-in-progress: true

jobs:
  capture-and-sync:
    name: Capture & sync docs screenshots
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 30
    steps:
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve version
        id: meta
        run: |
          VERSION=$(jq -r '.version' pulsecoach/config.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Pull release image
        env:
          ADDON_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          docker pull "ghcr.io/askb/pulsecoach-addon-amd64:${ADDON_VERSION}"
          docker tag "ghcr.io/askb/pulsecoach-addon-amd64:${ADDON_VERSION}" pulsecoach-e2e

      - name: Start addon container
        run: |
          docker run -d --name pulsecoach \
            -e DEV_BYPASS_AUTH=true \
            -e AI_BACKEND=none \
            -p 3000:3000 \
            pulsecoach-e2e

      - name: Wait for Next.js
        run: |
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:3000/; then
              echo "Ready after ${i} attempts"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Next.js did not start"
          docker logs pulsecoach || true
          exit 1

      - name: Seed athlete data
        run: |
          docker exec \
            -e POSTGRES_URL="postgresql://postgres@127.0.0.1:5432/pulsecoach" \
            -e PERSONA=athlete \
            pulsecoach sh -c '
              cd /app/packages/db &&
              npm install --no-save tsx >/dev/null &&
              npx tsx src/seed.ts &&
              npx tsx src/seed-e2e.ts
            '

      - name: Refresh computed metrics
        run: docker exec pulsecoach python3 /app/scripts/metrics-compute.py --once || true

      - name: Install Playwright
        working-directory: tools/screenshots
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Capture desktop screenshots
        working-directory: tools/screenshots
        env:
          BASE_URL: "http://localhost:3000"
        run: npm run screenshot:desktop

      - name: Sync to docs/screenshots/
        working-directory: tools/screenshots
        run: bash scripts/sync-to-docs.sh --app-repo /dev/null

      - name: Create addon docs PR
        uses: peter-evans/create-pull-request@67ccf781d68cd99b580ae25a4f7141cb6c3a73a2  # v7.0.8
        with:
          commit-message: "docs: update screenshots to v${{ steps.meta.outputs.version }}"
          title: "docs: update screenshots to v${{ steps.meta.outputs.version }}"
          body: |
            Auto-generated by the Sync Screenshots workflow after release v${{ steps.meta.outputs.version }}.

            Screenshots captured from the production Docker image with seeded athlete data.
          branch: docs/screenshots-v${{ steps.meta.outputs.version }}
          base: main
          add-paths: docs/screenshots/
          labels: documentation
          delete-branch: true

      - name: Sync to app repo
        uses: peter-evans/create-pull-request@67ccf781d68cd99b580ae25a4f7141cb6c3a73a2  # v7.0.8
        with:
          token: ${{ secrets.APP_REPO_PAT }}
          repository: askb/ha-garmin-fitness-coach-app
          commit-message: "docs: update screenshots to v${{ steps.meta.outputs.version }}"
          title: "docs: update screenshots to v${{ steps.meta.outputs.version }}"
          body: |
            Auto-synced from addon repo's Sync Screenshots workflow after release v${{ steps.meta.outputs.version }}.
          branch: docs/screenshots-v${{ steps.meta.outputs.version }}
          base: main
          path: docs/screenshots/
          add-paths: docs/screenshots/
          labels: documentation
          delete-branch: true
        continue-on-error: true

      - name: Tear down
        if: always()
        run: docker rm -f pulsecoach || true
