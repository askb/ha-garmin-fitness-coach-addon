name: CI - Addon

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest requests-mock psycopg2-binary garminconnect

      - name: Run addon runtime tests
        run: pytest pulsecoach/rootfs/app/tests/ -v

      - name: Run engine parity and integration tests
        run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Read build config
        id: config
        run: |
          BUILD_FROM=$(python3 -c \
            "import json; print(json.load(open('pulsecoach/build.json'))['build_from']['amd64'])")
          echo "build_from=${BUILD_FROM}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build --build-arg BUILD_FROM=${{ steps.config.outputs.build_from }} --build-arg CACHEBUST=${{ github.sha }} -t pulsecoach-test pulsecoach/

      - name: Smoke test container
        run: |
          docker run --rm pulsecoach-test python3 -c "
          import sys
          sys.path.insert(0, '/app/scripts')
          # Verify scripts are importable
          print('Smoke test passed')
          "
