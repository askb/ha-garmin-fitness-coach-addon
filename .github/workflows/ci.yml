name: CI - Addon

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest psycopg2-binary garminconnect

      - name: Run tests
        run: pytest garmincoach/rootfs/app/tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Read build config
        id: config
        run: |
          BUILD_FROM=$(python3 -c \
            "import json; print(json.load(open('garmincoach/build.json'))['build_from']['amd64'])")
          echo "build_from=${BUILD_FROM}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build --build-arg BUILD_FROM=${{ steps.config.outputs.build_from }} -t garmincoach-test garmincoach/

      - name: Smoke test container
        run: |
          docker run --rm garmincoach-test python3 -c "
          import sys
          sys.path.insert(0, '/app/scripts')
          # Verify scripts are importable
          print('Smoke test passed')
          "
