---
blueprint:
  name: "PulseCoach: Training Freshness Reminder"
  description: >
    Sends a training reminder when form (TSB) rises above a threshold,
    indicating the athlete is fresh and ready for a quality session.
  domain: automation
  author: askb
  source_url: >-
    https://github.com/askb/ha-garmin-fitness-coach-addon/blob/main/pulsecoach/rootfs/app/blueprints/training_freshness_reminder.yaml
  input:
    form_sensor:
      name: Form (TSB) Sensor
      default: sensor.pulsecoach_form
      selector:
        entity:
          domain: sensor
    freshness_threshold:
      name: Freshness Threshold (TSB)
      description: >
        Notify when form rises above this value.
        Positive TSB means recovery exceeds fatigue.
      default: 5
      selector:
        number:
          min: -10
          max: 30
          step: 1
    workout_sensor:
      name: Workout Recommendation Sensor
      default: sensor.pulsecoach_workout_recommendation
      selector:
        entity:
          domain: sensor
    notify_service:
      name: Notification Service
      default: notify.persistent_notification
      selector:
        text: {}

trigger:
  - platform: numeric_state
    entity_id: !input form_sensor
    above: !input freshness_threshold
    for:
      hours: 1

condition:
  - condition: time
    after: "07:00:00"
    before: "20:00:00"
  - condition: template
    value_template: >-
      {{ now().isoweekday() <= 6 }}

action:
  - service: !input notify_service
    data:
      title: "💪 You're Fresh — Time to Train!"
      message: >-
        Form (TSB) is {{ states(form_sensor) }}.
        You're recovered and ready for a quality session.
        Suggestion: {{ states(workout_sensor) }}.

mode: single
max_exceeded: silent
