{
  "configuration": {
    "garmin_email": {
      "name": "Garmin Email",
      "description": "Your Garmin Connect account email address"
    },
    "garmin_password": {
      "name": "Garmin Password",
      "description": "Your Garmin Connect account password"
    },
    "ai_backend": {
      "name": "AI Backend",
      "description": "AI engine: 'ha_conversation' (requires a conversation agent in HA), 'ollama' (local), 'none' (rules-based)"
    },
    "ollama_url": {
      "name": "Ollama URL",
      "description": "URL of your Ollama instance. Required for the 'ollama' AI backend, and also for coach memory/RAG embeddings even when AI Backend is 'ha_conversation' or 'none'."
    },
    "ollama_embed_model": {
      "name": "Ollama Embedding Model",
      "description": "Model used to embed history for coach memory/RAG (default 'nomic-embed-text'). Pull it on your Ollama host. Falls back to the chat model if unavailable."
    },
    "sync_interval_minutes": {
      "name": "Sync Interval",
      "description": "How often to sync data from Garmin Connect (in minutes)"
    },
    "user_timezone": {
      "name": "Timezone",
      "description": "Your local timezone for date boundaries (e.g., 'Australia/Brisbane', 'America/New_York'). Defaults to UTC."
    },
    "ha_events_enabled": {
      "name": "Home Assistant Events",
      "description": "Fire PulseCoach events into Home Assistant for automations and scenes."
    },
    "low_readiness_threshold": {
      "name": "Low Readiness Threshold",
      "description": "Readiness score below which a pulsecoach_low_readiness event is fired."
    },
    "missed_session_grace_min": {
      "name": "Missed Session Grace Period",
      "description": "Minutes to wait before missed planned sessions are considered actionable."
    },
    "meeting_lookback_days": {
      "name": "Stress Board Lookback (days)",
      "description": "How far back the Stress Board pulls linked-calendar events (1–365). Raise it (e.g. 90) to backfill more history for better per-person stress stats."
    },
    "meeting_rescore_interval_minutes": {
      "name": "Stress Board Auto-Rescore (minutes)",
      "description": "How often (minutes) the Stress Board re-scores in the background so meetings and interactions show once Garmin syncs their heart rate (0-1440, default 360). 0 disables it."
    }
  }
}
